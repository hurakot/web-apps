{% extends 'base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class = "col-md-8 mb-3 justify-content-start">
            <div>
                <form class="card" method="POST">
                    <div class="card-header">
                        <label for="input" class="form-label" aria-describedby="emailHelp">Оставить комментарий</label>
                    </div>
                    <div class="card-text">
                        <textarea id="input" class="form-control m-2" style="width: calc(100% - 15px);" rows="4" placeholder="Введите комментарий: " ></textarea>
                        <button type="submit" class="btn btn-primary m-2">Отправить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>    
{% endblock %}



<!--
страница с изменением пароля текущего пользователя, 
того, которым ты управляешь 
и от лица которого ты управляешь системой. 
Эта страница изменяет твой же пароль 
и эта страница доступна, если ты авторизован.
-->
{% extends 'base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class = "col-md-8 mb-3 justify-content-start">

            <div class="d-block">
                <form class="card" action="/changed" method= "POST">
                    <div class="card-header">
                        <label for="input" class="form-label ms-2" aria-describedby="emailHelp">Изменение пароля: </label>
                    </div>
                    <div class="card-text">

                        <label for="oldpassword" class="form-label ms-4 mt-2" aria-describedby="emailHelp">Старый пароль:</label>
                        <input id="oldpassword" class="form-control ms-2 mb-3 {% if password_correct == 2 %} is-invalid {%endif%}" value="{{oldpassword or '' }}" name="oldpassword" type="text" style="width: calc(100% - 15px);" placeholder="Введите старый пароль:" required>

                        <label for="newpassword" class="form-label ms-4" aria-describedby="emailHelp">Новый пароль:</label>
                        <input id="newpassword" class="form-control ms-2 mb-3 {% if password_correct == 0 or password_correct == 3 %} is-invalid {%endif%}" value="{{newpassword or '' }}" name="newpassword" type="text" style="width: calc(100% - 15px);" placeholder="Введите новый пароль:" required>

                        <label for="newpasswordagain" class="form-label ms-4" aria-describedby="emailHelp">Повтори новый пароль:</label>
                        <input id="newpasswordagain" class="form-control ms-2 mb-3 {% if password_correct == 0 or password_correct == 3 %} is-invalid {%endif%}" value="{{newpasswordagain or '' }}" name="newpasswordagain" type="text" style="width: calc(100% - 15px);" placeholder="Повторно введите новый пароль:" required>

                        <div class="d-block">
                            <button type="submit" class="btn btn-primary m-2">
                                Изменить пароль
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
